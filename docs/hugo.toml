baseURL = "https://gsi-hpc.github.io/sind/"
title = "sind"
theme = "hugo-geekdoc"
enableGitInfo = true
enableRobotsTXT = true
pygmentsUseClasses = true
pygmentsCodeFences = true
disablePathToLower = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 3

[taxonomies]
  tag = "tags"

[params]
  description = "sind — create and manage containerized Slurm clusters for development, testing, and CI/CD workflows"
  geekdocToC = 3
  geekdocSearch = true
  geekdocDarkModeToggle = true
  geekdocDarkModeDim = false
  geekdocNextPrev = true
  geekdocBreadcrumb = true
  geekdocBackToTop = true
  geekdocAnchor = true
  geekdocAnchorCopy = true
  geekdocImageLazyLoading = true
  geekdocMenuBundle = false
  geekdocCollapseAllSections = false
  geekdocFileTreeSortBy = "title"
  geekdocLogo = "images/sind-icon-only.svg"
  geekdocRepo = "https://github.com/GSI-HPC/sind"
  geekdocEditPath = ""

[minify]
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepWhitespace = true
