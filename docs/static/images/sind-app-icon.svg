<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" style="background:transparent">
  <!-- App icon background -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="#0F172A"/>

  <!-- Grid: 80px blocks, 14px gaps = 268px wide. Offset = (512-268)/2 = 122 -->
  <g transform="translate(122, 122)">
    <!-- Row 1 -->
    <rect x="0"   y="0" width="80" height="80" rx="14" fill="#0EA5E9" opacity=".92"/>
    <rect x="94"  y="0" width="80" height="80" rx="14" fill="#0EA5E9" opacity=".70"/>
    <rect x="188" y="0" width="80" height="80" rx="14" fill="#0EA5E9" opacity=".48"/>

    <!-- Row 2 -->
    <rect x="0"   y="94" width="80" height="80" rx="14" fill="#14B8A6" opacity=".82"/>
    <rect x="94"  y="94" width="80" height="80" rx="14" fill="#0D9488"/>
    <!-- Server bars -->
    <line x1="118" y1="122" x2="150" y2="122" stroke="#fff" stroke-width="3.5" opacity=".90" stroke-linecap="round"/>
    <line x1="118" y1="134" x2="150" y2="134" stroke="#fff" stroke-width="3.5" opacity=".90" stroke-linecap="round"/>
    <line x1="118" y1="146" x2="150" y2="146" stroke="#fff" stroke-width="3.5" opacity=".90" stroke-linecap="round"/>
    <rect x="188" y="94" width="80" height="80" rx="14" fill="#14B8A6" opacity=".58"/>

    <!-- Row 3 -->
    <rect x="0"   y="188" width="80" height="80" rx="14" fill="#0EA5E9" opacity=".48"/>
    <rect x="94"  y="188" width="80" height="80" rx="14" fill="#0EA5E9" opacity=".34"/>
    <rect x="188" y="188" width="80" height="80" rx="14" fill="#14B8A6" opacity=".40"/>

    <!-- Flow connectors between rows -->
    <line x1="40"  y1="82" x2="40"  y2="92" stroke="#0EA5E9" stroke-width="2.5" opacity=".38" stroke-linecap="round"/>
    <line x1="134" y1="82" x2="134" y2="92" stroke="#0D9488" stroke-width="2.5" opacity=".52" stroke-linecap="round"/>
    <line x1="228" y1="82" x2="228" y2="92" stroke="#14B8A6" stroke-width="2.5" opacity=".38" stroke-linecap="round"/>

    <line x1="40"  y1="176" x2="40"  y2="186" stroke="#14B8A6" stroke-width="2.5" opacity=".38" stroke-linecap="round"/>
    <line x1="134" y1="176" x2="134" y2="186" stroke="#0D9488" stroke-width="2.5" opacity=".52" stroke-linecap="round"/>
    <line x1="228" y1="176" x2="228" y2="186" stroke="#14B8A6" stroke-width="2.5" opacity=".30" stroke-linecap="round"/>
  </g>
</svg>
