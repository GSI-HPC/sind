name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v9

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Unit tests
        run: make test
        env:
          GOTEST: gotestsum --junitfile unit-tests.xml --

      - name: Test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Unit Test Results
          path: unit-tests.xml
          reporter: java-junit

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Integration tests
        run: make test-integration
        env:
          GOTEST: gotestsum --junitfile integration-tests.xml --

      - name: Test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Integration Test Results
          path: integration-tests.xml
          reporter: java-junit

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: sind-linux-amd64
          path: sind-linux-amd64
