name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v9

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Unit tests
        run: gotestsum --junitfile unit-tests.xml -- -race ./...

      - name: Integration tests
        run: gotestsum --junitfile integration-tests.xml -- -race -tags integration ./cmd/sind/

      - name: Test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Test Results
          path: "*-tests.xml"
          reporter: java-junit

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Build debug binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -o sind-linux-amd64-debug ./cmd/sind

      - name: Upload debug binary
        uses: actions/upload-artifact@v4
        with:
          name: sind-linux-amd64-debug
          path: sind-linux-amd64-debug
